    <title>Github Issue Tracker</title>
    <!-- css -->
    <link rel="stylesheet" href="style.css">
    <!-- daisyUI + tailwindcss -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body class="bg-[#F8FAFC]">
    <section id="navbar" class="mb-[60px]">
        <div class="navbar bg-base-100 shadow-sm flex justify-between px-15">
            <div id="nav-left" class="flex gap-2 items-center">
                <img src="assets/github-logo.png" width="36px" alt="" srcset="">
                <h3 class="font-semibold text-6 text-[#1F2937]">GitHub Issues Tracker</h3>
            </div>
            <div id="nav-right" class="flex items-center gap-2">
                <label class="input input-bordered flex items-center gap-2 w-24 md:w-auto h-12">
                    <svg class="h-4 w-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="search" class="grow" placeholder="Search issues..." />
                </label>

                <div tabindex="0" role="button" class="btn btn-primary font-semibold flex items-center gap-2 text-white h-12">
                    <i class="fa-regular fa-plus text-xl leading-none"></i>
                    <span>New Issue</span>
                </div>
            </div>
        </div>
    </section>


    <section id="btn-section">
        <div class="w-11/12 mx-auto flex pl-6 gap-4 py-6 bg-base-100 shadow-sm ">
            <button onclick="handleActive(this)" id="all-btn" class="btn btn-outline btn-primary btn-active">All</button>
            <button onclick="handleActive(this)" id="open-btn"  class="btn btn-outline btn-primary ">Open</button>
            <button onclick="handleActive(this)" id="closed-btn" class="btn btn-outline btn-primary">Closed</button>
        </div>
    </section>


    <section id="issues-section" class="w-11/12 mx-auto m-6 flex justify-between p-6 bg-base-100 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="assets/Aperture.png" width="50px" alt="" srcset="">
            <div class="">
                <h4 class="text-xl font-semibold text-[#1F2937]"><span id="issue-count">50</span> Issues</h4>
                <p class="text-lg text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex flex-col-2 gap-4 items-center">
            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-[#00A96E] rounded-full inline-block"></span>open</p>
            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-[#A855F7] rounded-full inline-block"></span>closed</p>
            </div>
    </section>

    <section id="spinner" class="flex justify-center mb-3 mt-5 py-10 hidden">
        <span class="loading loading-spinner text-primary"></span>
    </section>

    <section id="card-container" class="bg-gray-100 p-8 w-11/12 mx-auto rounded-lg shadow-sm grid md:grid-cols-4  gap-6 grid-cols-2">
